apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets-demo
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/mohammedd2510/argocd-gitops-repo-demo.git
    targetRevision: main
    path: sealed-secrets-demo
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
